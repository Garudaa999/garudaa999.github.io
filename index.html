<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GARUDA CYBER</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron',sans-serif;
}

body{
    background:black;
    overflow:hidden;
    color:#00ff66;
}

/* MATRIX */

canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-3;
}

/* SCAN LINE */

/* LOADER */

.loader{
    position:fixed;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
    color:#00ff66;
    font-size:22px;
    letter-spacing:4px;
    animation:hideLoader 4s forwards;
}

.bar{
    width:250px;
    height:12px;
    border:2px solid #00ff66;
    margin-top:20px;
    overflow:hidden;
}

.fill{
    width:0%;
    height:100%;
    background:#00ff66;
    animation:load 3s forwards;
}

@keyframes load{
    100%{width:100%;}
}

@keyframes hideLoader{
    0%{opacity:1;}
    90%{opacity:1;}
    100%{
        opacity:0;
        visibility:hidden;
    }
}

/* MAIN */

.container{
    width:100%;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
    position:relative;
}

/* STATUS */

.status{
    position:absolute;
    top:20px;
    left:20px;
    border:2px solid #00ff66;
    padding:12px 18px;
    border-radius:14px;
    background:rgba(0,255,100,0.05);
    box-shadow:0 0 15px rgba(0,255,100,0.3);
}

/* CLOCK */

.clock{
    position:absolute;
    top:20px;
    right:20px;
    border:2px solid #00ff66;
    padding:12px 20px;
    border-radius:14px;
    background:rgba(0,255,100,0.05);
    box-shadow:0 0 15px rgba(0,255,100,0.3);
    font-size:20px;
}

/* PROFILE */

.profile{
    width:240px;
    height:240px;
    border-radius:50%;
    overflow:hidden;
    border:4px solid #00ff66;

    box-shadow:
    0 0 20px #00ff66,
    0 0 60px #00ff66;

    animation:pulse 2s infinite;

    margin-bottom:30px;
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.03);}
    100%{transform:scale(1);}
}

/* TITLE */

.title{
    font-size:85px;
    font-weight:900;
    letter-spacing:6px;
    margin-bottom:10px;

    color:white;

    text-shadow:
    0 0 10px white,
    0 0 20px #00ff66,
    0 0 50px #00ff66;

    animation:flicker 2s infinite;
}

@keyframes flicker{

    0%{opacity:1;}
    5%{opacity:0.7;}
    10%{opacity:1;}
    15%{opacity:0.8;}
    20%{opacity:1;}

}

/* SUBTITLE */

.subtitle{
    color:#00ff66;
    letter-spacing:5px;
    margin-bottom:40px;
    font-size:18px;
}

/* MENU */

.menu{
    width:100%;
    max-width:650px;
}

/* BUTTONS */

.btn{
    display:flex;
    justify-content:space-between;
    align-items:center;

    text-decoration:none;
    color:#00ff66;

    border:2px solid #00ff66;
    border-radius:18px;

    padding:20px 25px;
    margin:22px 0;

    background:rgba(0,255,100,0.05);

    box-shadow:
    0 0 15px rgba(0,255,100,0.2);

    transition:0.3s;
}

.btn:hover{

    transform:scale(1.03);

    background:#00ff66;
    color:black;

    box-shadow:
    0 0 20px #00ff66,
    0 0 40px #00ff66;
}

.left{
    display:flex;
    align-items:center;
    gap:18px;
}

.icon{
    font-size:28px;
}

.text{
    font-size:23px;
    font-weight:700;
}

.arrow{
    font-size:30px;
}

/* FOOTER */

.footer{
    margin-top:40px;
    color:#00ff66;
    letter-spacing:4px;
    font-size:15px;
}

/* CORNERS */

.corner-left,
.corner-right{

    position:absolute;
    bottom:20px;

    border:2px solid #00ff66;

    background:rgba(0,255,100,0.05);

    border-radius:12px;

    padding:14px;

    box-shadow:0 0 15px rgba(0,255,100,0.2);

}

.corner-left{
    left:20px;
}

.corner-right{
    right:20px;
    text-align:center;
}

/* MUSIC BUTTON */

.music-btn{
    position:fixed;
    bottom:110px;
    right:20px;

    width:60px;
    height:60px;

    border-radius:50%;
    border:2px solid #00ff66;

    display:flex;
    justify-content:center;
    align-items:center;

    background:black;
    color:#00ff66;

    font-size:25px;

    cursor:pointer;

    box-shadow:
    0 0 15px #00ff66;

    z-index:999;
}

/* AI POPUP */

.ai-box{

    position:fixed;
    bottom:20px;
    right:20px;

    width:280px;

    border:2px solid #00ff66;

    background:rgba(0,0,0,0.8);

    padding:15px;

    border-radius:14px;

    box-shadow:
    0 0 20px rgba(0,255,100,0.3);

    z-index:999;
}

.ai-title{
    color:#00ff66;
    margin-bottom:10px;
    font-size:15px;
}

.ai-text{
    color:white;
    font-size:13px;
    line-height:1.7;
}

/* RESPONSIVE */

@media(max-width:700px){

.title{
    font-size:50px;
}

.profile{
    width:180px;
    height:180px;
}

.text{
    font-size:17px;
}

.subtitle{
    font-size:13px;
}

.btn{
    padding:18px;
}

}

</style>
</head>

<script>

/* MATRIX */

const canvas = document.querySelector("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = "GARUDA101010CYBER";
const letters = chars.split("");

const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];

for(let x=0; x<columns; x++){

    drops[x]=1;

}

function draw(){

    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#00ff66";
    ctx.font=fontSize+"px monospace";

    for(let i=0; i<drops.length; i++){

        const text=
        letters[Math.floor(Math.random()*letters.length)];

        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize>canvas.height &&
        Math.random()>0.975){

            drops[i]=0;

        }

        drops[i]++;

    }

}

setInterval(draw,33);

/* CLOCK */

function updateClock(){

    const now=new Date();

    let h=String(now.getHours()).padStart(2,'0');
    let m=String(now.getMinutes()).padStart(2,'0');
    let s=String(now.getSeconds()).padStart(2,'0');

    document.getElementById("clock").innerHTML=
    `${h}:${m}:${s}`;

}

setInterval(updateClock,1000);

updateClock();

/* MUSIC */

const music=document.getElementById("bgMusic");

function toggleMusic(){

    if(music.paused){

        music.play();

    }else{

        music.pause();

    }

}

</script>
